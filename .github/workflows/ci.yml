name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  demo:
    name: Submission verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Chrome for visual smoke
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Verify Chrome
        run: '"${{ steps.setup-chrome.outputs.chrome-path }}" --version'

      - name: Run submission checks
        run: npm run submission:check
        env:
          ECHOGRID_BROWSER: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echogrid-evaluation-logs
          path: logs
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload submission bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echogrid-submission-bundle
          path: dist/submission
          if-no-files-found: ignore
          retention-days: 14
