name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  demo:
    name: Demo verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run full demo and artifact checks
        run: npm run demo:ci

      - name: Upload showcase artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echogrid-showcase
          path: logs/showcase
          if-no-files-found: ignore
